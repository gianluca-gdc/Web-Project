<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Creation Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <a class="sign-out" href="/login.html">
            <button type="button">Sign Out</button>
        </a>
        <div class="recreate-header">
            <h1 class="recreate-text">Re /Create</h1>
            <img src="photos/image.png" alt="yourself-image">
            <br>
        </div>
        <h3>To Re/ Connect</h3>
    </header>
    <form id="profileForm" action="mainPage.html">

        <div class="profile">
            <div class="profile-left">
                <label>Profile Picture:</label>
                <button type="button">Select Photo</button>
            </div>
            <i class="bi bi-person-circle"></i>
            <br>
        </div>

        <label for="Age">Age:</label>
        <input type="number" id="Age" name="Age" min="16" max="99" required>
        <br>

        <label for="Gender">Gender:</label>
        <div class="Gender">
            <button type="button" class="gender-btn" data-gender="Male">Male</button>
            <button type="button" class="gender-btn" data-gender="Female">Female</button>
        </div>
        <br>

        <label for="Major">Major:</label>
        <input type="text" id="Major" name="Major" required>
        <br>

        <label for="Interests">Interests: (Select at least 3, comma-separated)</label>
        <br>
        <input class="interests" type="text" id="Interests" name="Interests"
               placeholder="e.g. hiking, coding, music" required>
        <br>

        <button class="recreate-button" type="submit">Re /Create</button>
    </form>
    <footer>
        <p>&copy; 2026 Re /Connect. All rights reserved.</p>
    </footer>
    <script src="./scripts/profile.js"></script>
</body>
</html>
