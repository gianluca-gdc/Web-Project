<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Re /Connect Registration</h1>
    <h2>Sign up for a new account</h2>
    <form id="registerForm" action="/profileCreate.html" method="post">
        <label for="FirstName">First Name:</label>
        <input type="text" id="FirstName" name="FirstName" required>
        <br>
        <label for="LastName">Last Name:</label>
        <input type="text" id="LastName" name="LastName" required>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br>
        <label for="confirm_email">Confirm Email:</label>
        <input type="email" id="confirm_email" name="confirm_email" required>
        <br>
        <p>Create a password containing 5 - 10 alphanumeric characters only.</p>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br>
        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
        <br>
        <button class="register" type="submit">Register</button>
        <br>
        <label class="login" for="login">Already have an account? <a href="/login.html">Login</a></label>
    </form>
    <footer>
        <p>&copy; 2026 Re /Connect. All rights reserved.</p>
    </footer>
    <script src="user.js"></script>
</body>
</html>
